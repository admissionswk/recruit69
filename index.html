<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรับสมัครนักเรียนปีการศึกษา 2569</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; }
        .school-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .animate-bounce-short { animation: bounce 1s ease-in-out 1; }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Header -->
    <div class="school-gradient text-white py-12 px-4 text-center shadow-lg mb-8">
        <h1 class="text-3xl md:text-4xl font-bold mb-2">ระบบรับสมัครนักเรียนออนไลน์</h1>
        <p class="text-lg opacity-90">ประจำปีการศึกษา 2569</p>
    </div>

    <div class="max-w-4xl mx-auto px-4">
        <!-- Form Container -->
        <div id="formSection" class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">กรอกข้อมูลการสมัคร</h2>
            
            <form id="regForm" class="space-y-6">
                <!-- Category Selection -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">ประเภทการรับสมัคร <span class="text-red-500">*</span></label>
                    <select id="category" name="category" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">-- เลือกประเภท --</option>
                        <option value="M1_Out">1. ม.1 นอกเขตพื้นที่บริการ</option>
                        <option value="M1_In">2. ม.1 ในเขตพื้นที่บริการ</option>
                        <option value="M4_Gen">3. ม.4 ทั่วไป</option>
                        <option value="M1_Talent">4. ม.1 ประเภทความสามารถพิเศษ</option>
                    </select>
                </div>

                <!-- Applicant ID -->
                <div>
                    <label class="block text-gray-700 font-bold mb-2">เลขที่ประจำตัวผู้สมัคร <span class="text-red-500">*</span></label>
                    <input type="text" name="applicantId" required placeholder="เช่น 10001, 20001" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">คำนำหน้าชื่อ</label>
                        <select name="title" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="เด็กชาย">เด็กชาย</option>
                            <option value="เด็กหญิง">เด็กหญิง</option>
                            <option value="นาย">นาย</option>
                            <option value="นางสาว">นางสาว</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">ชื่อ-นามสกุล <span class="text-red-500">*</span></label>
                        <input type="text" name="fullname" required placeholder="ไม่ต้องระบุคำนำหน้า" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-2">เลขประจำตัวประชาชน (13 หลัก) <span class="text-red-500">*</span></label>
                    <input type="text" name="citizenId" required maxlength="13" pattern="\d{13}" placeholder="xxxxxxxxxxxxx" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-2">โรงเรียนเดิม</label>
                    <input type="text" name="oldSchool" required placeholder="ชื่อโรงเรียนปัจจุบัน" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <!-- M4 Specific Section (Hidden by default) -->
                <div id="m4Section" class="hidden bg-blue-50 p-6 rounded-xl border border-blue-200 space-y-6">
                    <h3 class="text-xl font-bold text-blue-800 border-b border-blue-200 pb-2">ข้อมูลเฉพาะผู้สมัคร ม.4 ทั่วไป</h3>
                    
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">เลขประจำตัวนักเรียน ส.ว.ค.เดิม (ถ้ามี)</label>
                        <input type="text" name="swkId" placeholder="ไม่ต้องกรอกหากไม่ใช่ศิษย์เก่า" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-bold mb-4">เลือกแผนการเรียน (เลือก 4 อันดับ) <span class="text-red-500">*</span></label>
                        <div class="space-y-4">
                            <!-- แผนอันดับ 1-4 วนลูปสร้างด้วย HTML -->
                            <!-- อันดับ 1 -->
                            <div class="flex flex-col md:flex-row gap-4">
                                <div class="flex-1">
                                    <label class="block text-sm text-gray-600 mb-1 font-bold">อันดับที่ 1</label>
                                    <select name="plan1" id="plan1" class="m4-plan w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                        <option value="">-- เลือกแผนการเรียน --</option>
                                        <option value="วิทยาศาสตร์ คณิตศาสตร์-เทคโนโลยี">1) วิทยาศาสตร์ คณิตศาสตร์-เทคโนโลยี</option>
                                        <option value="วิทยาศาสตร์ คณิตศาสตร์ (วิทยาศาสตร์พลังสิบ)">2) วิทยาศาสตร์ คณิตศาสตร์ (วิทยาศาสตร์พลังสิบ)</option>
                                        <option value="วิทยาศาสตร์-คณิตศาสตร์ (ปกติ)">3) วิทยาศาสตร์-คณิตศาสตร์ (ปกติ)</option>
                                        <option value="ศิลป์-คณิต">4) ศิลป์-คณิต</option>
                                        <option value="ศิลป์-ภาษา">5) ศิลป์-ภาษา (ต้องระบุภาษา)</option>
                                    </select>
                                </div>
                                <div class="flex-1 hidden" id="langDiv1">
                                    <label class="block text-sm text-blue-600 mb-1 font-bold">ระบุภาษา (จีน, เกาหลี, ญี่ปุ่น, เขมร)</label>
                                    <input type="text" name="lang1" id="lang1" placeholder="พิมพ์ระบุภาษา" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                </div>
                            </div>

                            <!-- อันดับ 2 -->
                            <div class="flex flex-col md:flex-row gap-4">
                                <div class="flex-1">
                                    <label class="block text-sm text-gray-600 mb-1 font-bold">อันดับที่ 2</label>
                                    <select name="plan2" id="plan2" class="m4-plan w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                        <option value="">-- เลือกแผนการเรียน --</option>
                                        <option value="วิทยาศาสตร์ คณิตศาสตร์-เทคโนโลยี">1) วิทยาศาสตร์ คณิตศาสตร์-เทคโนโลยี</option>
                                        <option value="วิทยาศาสตร์ คณิตศาสตร์ (วิทยาศาสตร์พลังสิบ)">2) วิทยาศาสตร์ คณิตศาสตร์ (วิทยาศาสตร์พลังสิบ)</option>
                                        <option value="วิทยาศาสตร์-คณิตศาสตร์ (ปกติ)">3) วิทยาศาสตร์-คณิตศาสตร์ (ปกติ)</option>
                                        <option value="ศิลป์-คณิต">4) ศิลป์-คณิต</option>
                                        <option value="ศิลป์-ภาษา">5) ศิลป์-ภาษา (ต้องระบุภาษา)</option>
                                    </select>
                                </div>
                                <div class="flex-1 hidden" id="langDiv2">
                                    <label class="block text-sm text-blue-600 mb-1 font-bold">ระบุภาษา (จีน, เกาหลี, ญี่ปุ่น, เขมร)</label>
                                    <input type="text" name="lang2" id="lang2" placeholder="พิมพ์ระบุภาษา" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                </div>
                            </div>

                            <!-- อันดับ 3 -->
                            <div class="flex flex-col md:flex-row gap-4">
                                <div class="flex-1">
                                    <label class="block text-sm text-gray-600 mb-1 font-bold">อันดับที่ 3</label>
                                    <select name="plan3" id="plan3" class="m4-plan w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                        <option value="">-- เลือกแผนการเรียน --</option>
                                        <option value="วิทยาศาสตร์ คณิตศาสตร์-เทคโนโลยี">1) วิทยาศาสตร์ คณิตศาสตร์-เทคโนโลยี</option>
                                        <option value="วิทยาศาสตร์ คณิตศาสตร์ (วิทยาศาสตร์พลังสิบ)">2) วิทยาศาสตร์ คณิตศาสตร์ (วิทยาศาสตร์พลังสิบ)</option>
                                        <option value="วิทยาศาสตร์-คณิตศาสตร์ (ปกติ)">3) วิทยาศาสตร์-คณิตศาสตร์ (ปกติ)</option>
                                        <option value="ศิลป์-คณิต">4) ศิลป์-คณิต</option>
                                        <option value="ศิลป์-ภาษา">5) ศิลป์-ภาษา (ต้องระบุภาษา)</option>
                                    </select>
                                </div>
                                <div class="flex-1 hidden" id="langDiv3">
                                    <label class="block text-sm text-blue-600 mb-1 font-bold">ระบุภาษา (จีน, เกาหลี, ญี่ปุ่น, เขมร)</label>
                                    <input type="text" name="lang3" id="lang3" placeholder="พิมพ์ระบุภาษา" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                </div>
                            </div>

                            <!-- อันดับ 4 -->
                            <div class="flex flex-col md:flex-row gap-4">
                                <div class="flex-1">
                                    <label class="block text-sm text-gray-600 mb-1 font-bold">อันดับที่ 4</label>
                                    <select name="plan4" id="plan4" class="m4-plan w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                        <option value="">-- เลือกแผนการเรียน --</option>
                                        <option value="วิทยาศาสตร์ คณิตศาสตร์-เทคโนโลยี">1) วิทยาศาสตร์ คณิตศาสตร์-เทคโนโลยี</option>
                                        <option value="วิทยาศาสตร์ คณิตศาสตร์ (วิทยาศาสตร์พลังสิบ)">2) วิทยาศาสตร์ คณิตศาสตร์ (วิทยาศาสตร์พลังสิบ)</option>
                                        <option value="วิทยาศาสตร์-คณิตศาสตร์ (ปกติ)">3) วิทยาศาสตร์-คณิตศาสตร์ (ปกติ)</option>
                                        <option value="ศิลป์-คณิต">4) ศิลป์-คณิต</option>
                                        <option value="ศิลป์-ภาษา">5) ศิลป์-ภาษา (ต้องระบุภาษา)</option>
                                    </select>
                                </div>
                                <div class="flex-1 hidden" id="langDiv4">
                                    <label class="block text-sm text-blue-600 mb-1 font-bold">ระบุภาษา (จีน, เกาหลี, ญี่ปุ่น, เขมร)</label>
                                    <input type="text" name="lang4" id="lang4" placeholder="พิมพ์ระบุภาษา" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full school-gradient text-white font-bold py-4 rounded-xl hover:opacity-90 transition-all shadow-md text-xl">
                    ยืนยันการสมัคร
                </button>
            </form>
        </div>

        <!-- Success Section (Hidden by default) -->
        <div id="successSection" class="hidden bg-white rounded-2xl shadow-2xl p-8 border-t-8 border-green-500 text-center animate-bounce-short">
            <div class="mb-4 inline-flex items-center justify-center w-20 h-20 bg-green-100 text-green-600 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">ลงทะเบียนสำเร็จ!</h2>
            <p class="text-gray-600 mb-6 text-lg">กรุณาบันทึกภาพหน้าจอนี้ไว้เป็นหลักฐาน</p>
            
            <div id="resultCard" class="bg-gray-50 border-2 border-dashed border-gray-300 rounded-xl p-6 text-left space-y-3 max-w-sm mx-auto shadow-inner">
                <div class="flex justify-between border-b pb-2"><span class="text-gray-500">ประเภท:</span> <span id="resCat" class="font-bold"></span></div>
                <div class="flex justify-between border-b pb-2"><span class="text-gray-500">เลขที่ผู้สมัคร:</span> <span id="resId" class="text-blue-700 font-black text-2xl"></span></div>
                <div class="flex justify-between border-b pb-2"><span class="text-gray-500">ชื่อ-สกุล:</span> <span id="resName" class="font-bold"></span></div>
                <div class="flex justify-between border-b pb-2 text-xl"><span class="text-gray-500">ห้องสอบ:</span> <span id="resRoom" class="text-red-600 font-bold"></span></div>
            </div>

            <button onclick="window.location.reload()" class="mt-8 text-blue-600 font-medium underline hover:text-blue-800">กลับไปสมัครหน้าหลัก</button>
        </div>

        <!-- Loading Overlay -->
        <div id="loader" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white p-6 rounded-xl flex flex-col items-center shadow-2xl">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mb-4"></div>
                <p class="font-bold text-gray-800">กำลังบันทึกข้อมูลและตรวจสอบระบบ...</p>
                <p class="text-sm text-gray-500 mt-2">กรุณารอสักครู่</p>
            </div>
        </div>
    </div>

    <script>
        // *** สำคัญ: นำ URL ที่ได้จากการ Deploy Google Apps Script แบบ "เว็บแอป" มาวางที่นี่ ***
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyR6wIzkJo3N7M4sx1j4Vi-7HIB2Cc3egf1u7fdagG3MmeJ3m9A8W7AWaFhG8UZDFqEMg/exec"; 

        const regForm = document.getElementById('regForm');
        const loader = document.getElementById('loader');
        const formSection = document.getElementById('formSection');
        const successSection = document.getElementById('successSection');
        
        // Element ของ ม.4
        const categorySelect = document.getElementById('category');
        const m4Section = document.getElementById('m4Section');
        const m4Plans = document.querySelectorAll('.m4-plan');

        // ควบคุมการแสดงผลส่วนของ ม.4 ทั่วไป
        categorySelect.addEventListener('change', function() {
            if (this.value === 'M4_Gen') {
                m4Section.classList.remove('hidden');
                m4Plans.forEach(plan => plan.setAttribute('required', 'required'));
            } else {
                m4Section.classList.add('hidden');
                m4Plans.forEach(plan => plan.removeAttribute('required'));
            }
        });

        // ควบคุมการแสดงผลช่อง "ระบุภาษา" ถ้าเลือกศิลป์-ภาษา
        for(let i=1; i<=4; i++) {
            const planSelect = document.getElementById('plan' + i);
            const langDiv = document.getElementById('langDiv' + i);
            const langInput = document.getElementById('lang' + i);
            
            planSelect.addEventListener('change', function() {
                if(this.value === 'ศิลป์-ภาษา') {
                    langDiv.classList.remove('hidden');
                    langInput.setAttribute('required', 'required');
                } else {
                    langDiv.classList.add('hidden');
                    langInput.removeAttribute('required');
                    langInput.value = ''; // ล้างค่าเดิมทิ้ง
                }
            });
        }

        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!SCRIPT_URL || SCRIPT_URL.trim() === "") {
                alert('ข้อผิดพลาด: คุณยังไม่ได้ใส่ URL ของ Google Apps Script (SCRIPT_URL) ในไฟล์ HTML');
                return;
            }

            // แสดงหน้าโหลด
            loader.classList.remove('hidden');
            
            const formData = new FormData(regForm);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    showSuccess(result.data);
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error("Error Detail:", error);
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล: ' + error.message);
            } finally {
                // ซ่อนหน้าโหลด
                loader.classList.add('hidden');
            }
        });

        function showSuccess(data) {
            // อัปเดตข้อมูลลงในบัตรแสดงผล
            document.getElementById('resCat').innerText = data.categoryName || "ไม่ระบุประเภท";
            document.getElementById('resId').innerText = data.applicantId || "-";
            document.getElementById('resName').innerText = data.fullName || "-";
            document.getElementById('resRoom').innerText = data.room || "-";

            // สลับหน้าจอจากฟอร์มไปหน้าสำเร็จ
            formSection.classList.add('hidden');
            successSection.classList.remove('hidden');
            
            // เลื่อนหน้าจอขึ้นไปบนสุด
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
